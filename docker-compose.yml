version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: calendar-postgres
    environment:
      POSTGRES_DB: calendar_db
      POSTGRES_USER: calendar_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-calendar_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calendar_user -d calendar_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: calendar-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    container_name: calendar-server
    environment:
      DATABASE_URL: postgresql://calendar_user:${DB_PASSWORD:-calendar_password}@postgres:5432/calendar_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key}
      JWT_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_IN: 7d
      PORT: 3000
      NODE_ENV: production
      CORS_ORIGIN: http://localhost
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "cd packages/server && npx prisma migrate deploy && cd ../.. && node packages/server/dist/index.js"

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: calendar-web
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  postgres_data:
